spring.application.name=demo
server.port=9090

# ===============================
# WRITE DATABASE (Primary/Master)
# ===============================
spring.datasource.write.jdbc-url=jdbc:mysql://localhost:3306/primary_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.write.username=root
spring.datasource.write.password=root
spring.datasource.write.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# READ DATABASE (Replica/Slave)
# ===============================
# NOTE: Both are on 3306, but in different schemas (primary vs replica)
spring.datasource.read.jdbc-url=jdbc:mysql://localhost:3306/replica_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.read.username=root
spring.datasource.read.password=root
spring.datasource.read.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# CRITICAL: Since you are using Liquibase, Hibernate should not touch the schema
spring.jpa.hibernate.ddl-auto=none

# Stop Hibernate from trying to "guess" metadata which triggers the circular loop
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ===============================
# LIQUIBASE (Bypassing Auto-Config)
# ===============================
# We keep the path so your manual code can find the file
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# This MUST be false to avoid the Circular Dependency with RoutingDataSource
spring.liquibase.enabled=false

# Allow bean overriding for custom DataSource setup
spring.main.allow-bean-definition-overriding=true
spring.jpa.properties.hibernate.connection.handling_mode=delayed_acquisition_and_hold

spring.jpa.properties.hibernate.default_schema=primary_db
logging.level.org.hibernate.orm.results=TRACE
logging.level.org.hibernate.resource.transaction=DEBUG
logging.level.org.springframework.transaction=TRACE

# Let Hibernate handle the autocommit state correctly for Spring
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
logging.level.org.hibernate.engine.transaction.internal.TransactionImpl=DEBUG
logging.level.org.hibernate.resource.transaction.backend.jdbc.internal.JdbcResourceLocalTransactionCoordinatorImpl=DEBUG